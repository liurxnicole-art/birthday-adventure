<!DOCTYPE html>
<html>
<head>
    <title>爸爸的生日大冒险 | 生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        
        .game-wrapper {
            position: relative;
            width: 1300px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #FFD700;
        }
        
        .ui-bar {
            background: linear-gradient(90deg, #2a1f0a, #4a3f2a);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 3px solid #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            height: 70px;
            position: relative;
        }
        
        .coin-counter {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 30px;
            border: 2px solid #FFD700;
            font-size: 28px;
            margin: 0 auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .world-indicator {
            background: rgba(255,215,0,0.2);
            padding: 5px 25px;
            border-radius: 30px;
            border: 2px solid #FFD700;
            color: #FFD700;
            font-size: 22px;
        }
        
        .canvas-container {
            position: relative;
            width: 1300px;
            height: 600px;
            background: #000;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }
        
        canvas {
            display: block;
            width: auto;
            height: 600px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .controls-hint {
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 18px;
            border: 2px solid #FFD700;
            backdrop-filter: blur(5px);
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            line-height: 1.6;
            margin: 10px 20px;
            text-align: center;
            display: inline-block;
            width: auto;
        }
        
        .controls-hint span {
            color: #FFD700;
            font-weight: bold;
            margin: 0 8px;
            font-size: 20px;
        }
        
        .coin-value {
            color: #FFD700 !important;
            font-size: 28px !important;
        }
        
        .canvas-container::-webkit-scrollbar {
            height: 10px;
        }
        
        .canvas-container::-webkit-scrollbar-track {
            background: #2a1f0a;
        }
        
        .canvas-container::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 5px;
        }

        .hint-container {
            display: flex;
            justify-content: center;
            background: linear-gradient(90deg, #2a1f0a, #4a3f2a);
            border-top: 2px solid #FFD700;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="hint-container">
            <div class="controls-hint">
                <span>←→</span> 移动 <span>↑</span> 跳跃 <span>🚪</span> 传送门去新世界
            </div>
        </div>
        <div class="ui-bar">
            <div class="world-indicator" id="worldDisplay">🌃 繁华都市</div>
            <div class="coin-counter">
                <span>💰</span>
                <span class="coin-value" id="coinDisplay">0</span>
            </div>
            <div>❤️ <span id="attemptsDisplay">3</span>/3</div>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas" width="15000" height="600"></canvas>
        </div>
    </div>

    <script>
        (function() {
            // ========== 终极修复版 - 传送门再也不会摔死 ==========
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvasContainer');
            
            canvas.width = 15000;
            canvas.height = 600;
            
            const VIEWPORT_WIDTH = 1300;
            const VIEWPORT_HEIGHT = 600;
            
            let currentWorld = 'city';
            let totalCoins = 0;
            let attempts = 3;
            let gameActive = true;
            let gameWon = false;
            let winType = null;
            let animationTimer = 0;
            
            // ========== 玩家类 ==========
            class Player {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 40;
                    this.height = 40;
                    this.vx = 0;
                    this.vy = 0;
                    this.speed = 8;
                    this.jumpPower = -14;
                    this.gravity = 0.6;
                    this.isOnGround = false;
                    this.facing = 1;
                    this.jumpHeld = false;
                }
                
                update(platforms, obstacles) {
                    this.vx = 0;
                    if (keys.left) this.vx = -this.speed;
                    if (keys.right) this.vx = this.speed;
                    
                    if (this.vx !== 0) this.facing = this.vx > 0 ? 1 : -1;
                    
                    this.x += this.vx;
                    
                    if (keys.up && this.isOnGround) {
                        this.vy = this.jumpPower;
                        this.isOnGround = false;
                        this.jumpHeld = true;
                    }
                    
                    if (keys.up && this.vy < 0 && this.jumpHeld) {
                        this.vy -= 0.2;
                    }
                    
                    if (!keys.up && this.vy < 0) {
                        this.vy *= 0.8;
                        this.jumpHeld = false;
                    }
                    
                    this.vy += this.gravity;
                    this.y += this.vy;
                    
                    this.isOnGround = false;
                    
                    for (let plat of platforms) {
                        if (this.checkCollision(plat)) {
                            let overlapLeft = this.x + this.width - plat.x;
                            let overlapRight = plat.x + plat.width - this.x;
                            let overlapTop = this.y + this.height - plat.y;
                            let overlapBottom = plat.y + plat.height - this.y;
                            
                            let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                            
                            if (minOverlap === overlapTop && this.vy >= 0) {
                                this.y = plat.y - this.height;
                                this.vy = 0;
                                this.isOnGround = true;
                            } else if (minOverlap === overlapBottom && this.vy <= 0) {
                                this.y = plat.y + plat.height;
                                this.vy = 0;
                            } else if (minOverlap === overlapLeft && this.vx > 0) {
                                this.x = plat.x - this.width;
                            } else if (minOverlap === overlapRight && this.vx < 0) {
                                this.x = plat.x + plat.width;
                            }
                        }
                    }
                    
                    for (let obs of obstacles) {
                        if (this.checkCollision(obs)) {
                            return false;
                        }
                    }
                    
                    if (this.y > 560) return false;
                    if (this.y < 0) {
                        this.y = 0;
                        this.vy = 0;
                    }
                    
                    if (this.x < 0) this.x = 0;
                    if (this.x > 14960) this.x = 14960;
                    
                    return true;
                }
                
                checkCollision(other) {
                    return this.x < other.x + other.width &&
                           this.x + this.width > other.x &&
                           this.y < other.y + other.height &&
                           this.y + this.height > other.y;
                }
                
                draw(ctx) {
                    let screenX = this.x;
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(screenX + 20, this.y + 45, 18, 6, 0, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#FF4136';
                    ctx.fillRect(screenX, this.y, 40, 40);
                    
                    ctx.fillStyle = '#4169E1';
                    ctx.fillRect(screenX + 8, this.y + 18, 24, 12);
                    
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(screenX + 20, this.y + 24, 4, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#C41E3A';
                    ctx.fillRect(screenX + 10, this.y - 10, 20, 10);
                    
                    ctx.fillStyle = 'white';
                    ctx.fillRect(screenX + 8, this.y - 5, 24, 3);
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(screenX + 12, this.y + 10, 5, 0, Math.PI*2);
                    ctx.arc(screenX + 28, this.y + 10, 5, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(screenX + (this.facing === 1 ? 14 : 10), this.y + 10, 3, 0, Math.PI*2);
                    ctx.arc(screenX + 30, this.y + 10, 3, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(screenX + 14, this.y + 16, 12, 2);
                }
            }
            
            // ========== 平台类 ==========
            class Platform {
                constructor(x, y, width, height, world = 'city') {
                    this.x = x;
                    this.y = y;
                    this.width = width;
                    this.height = height;
                    this.world = world;
                }
                
                draw(ctx) {
                    let colors = {
                        'city': '#8B4513',
                        'cloud': '#C0C0C0',
                        'cave': '#5D3A1A'
                    };
                    
                    ctx.fillStyle = colors[this.world] || '#8B4513';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    ctx.fillStyle = '#A0522D';
                    for (let i = 0; i < this.width; i += 40) {
                        ctx.fillRect(this.x + i + 5, this.y + 2, 30, 5);
                    }
                    
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(this.x, this.y - 4, this.width, 4);
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(this.x, this.y + this.height, this.width, 5);
                }
            }
            
            // ========== 金币类 ==========
            class Coin {
                constructor(x, y, value = 1, world = 'city') {
                    this.x = x;
                    this.y = y - 25;
                    this.width = 25;
                    this.height = 25;
                    this.value = value;
                    this.world = world;
                    this.collected = false;
                    this.animation = 0;
                }
                
                update() {
                    this.animation += 0.05;
                }
                
                draw(ctx) {
                    if (this.collected) return;
                    
                    let floatY = Math.sin(this.animation) * 3;
                    
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 15;
                    
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(this.x + 12, this.y + 12 + floatY, 14, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = '#FFF';
                    ctx.beginPath();
                    ctx.arc(this.x + 8, this.y + 8 + floatY, 4, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 16px Arial';
                    ctx.fillStyle = '#B8860B';
                    ctx.fillText('💰', this.x + 5, this.y + 22 + floatY);
                }
                
                checkCollect(player) {
                    if (this.collected) return false;
                    
                    return player.x < this.x + this.width &&
                           player.x + player.width > this.x &&
                           player.y < this.y + this.height &&
                           player.y + player.height > this.y;
                }
            }
            
            // ========== 传送门类 ==========
            class Portal {
                constructor(x, y, targetWorld, targetX, targetY, color = '#9932CC') {
                    this.x = x;
                    this.y = y - 80;
                    this.width = 70;
                    this.height = 90;
                    this.targetWorld = targetWorld;
                    this.targetX = targetX;
                    this.targetY = targetY;
                    this.color = color;
                    this.animation = 0;
                    this.world = null;
                }
                
                update() {
                    this.animation += 0.03;
                }
                
                draw(ctx) {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 30;
                    
                    for (let i = 0; i < 3; i++) {
                        let offset = (this.animation + i * 2) % (Math.PI * 2);
                        ctx.globalAlpha = 0.3 + Math.sin(offset) * 0.2;
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.ellipse(this.x + 35, this.y + 45 + Math.sin(offset) * 10, 40, 50, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                    
                    ctx.globalAlpha = 1;
                    
                    ctx.fillStyle = '#4A2A1A';
                    ctx.fillRect(this.x, this.y, 70, 90);
                    
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.8;
                    ctx.fillRect(this.x + 5, this.y + 5, 60, 80);
                    
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    for (let i = 0; i < 4; i++) {
                        let yOffset = this.y + 20 + i * 18;
                        ctx.beginPath();
                        ctx.moveTo(this.x + 15, yOffset);
                        ctx.lineTo(this.x + 55, yOffset + 8);
                        ctx.strokeStyle = `rgba(255,255,255,${0.5 + Math.sin(this.animation + i) * 0.3})`;
                        ctx.stroke();
                    }
                    
                    ctx.shadowBlur = 0;
                    
                    ctx.font = 'bold 20px Arial';
                    ctx.fillStyle = 'white';
                    ctx.fillText('🚪', this.x + 20, this.y - 10);
                    
                    ctx.font = 'bold 14px Arial';
                    ctx.fillStyle = '#FFD700';
                    ctx.fillText(this.targetWorld === 'cloud' ? '去云界' : 
                                 this.targetWorld === 'cave' ? '去洞穴' : '回城市', this.x + 10, this.y + 105);
                }
                
                checkEnter(player) {
                    if (player.x < this.x + this.width &&
                        player.x + player.width > this.x &&
                        player.y < this.y + this.height &&
                        player.y + player.height > this.y) {
                        return {
                            world: this.targetWorld,
                            x: this.targetX,
                            y: this.targetY - 40  // 重要：减去玩家高度，确保站在平台上
                        };
                    }
                    return null;
                }
            }
            
            // ========== 障碍物类 ==========
            class Obstacle {
                constructor(x, y, width, height, world = 'city') {
                    this.x = x;
                    this.y = y;
                    this.width = width;
                    this.height = height;
                    this.world = world;
                }
                
                draw(ctx) {
                    // 障碍物已被移除，不绘制任何内容
                }
            }
            
            // ========== 创建完美关卡 ==========
            let platforms = [];
            let obstacles = [];
            let coins = [];
            let portals = [];
            
            // ===== 不夜城 (0-5000) =====
            platforms.push(new Platform(0, 560, 800, 30, 'city'));
            for (let i = 0; i < 8; i++) {
                coins.push(new Coin(150 + i * 70, 560, 1, 'city'));
            }
            
            platforms.push(new Platform(900, 520, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(950 + i * 60, 520, 1, 'city'));
            }
            
            platforms.push(new Platform(1300, 480, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(1350 + i * 60, 480, 1, 'city'));
            }
            
            platforms.push(new Platform(1700, 440, 400, 30, 'city'));
            for (let i = 0; i < 6; i++) {
                coins.push(new Coin(1750 + i * 60, 440, 1, 'city'));
            }
            
            platforms.push(new Platform(2200, 400, 200, 30, 'city'));
            portals.push(new Portal(2250, 400, 'cloud', 5200, 450, '#87CEEB'));
            
            platforms.push(new Platform(2500, 480, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(2550 + i * 60, 480, 1, 'city'));
            }
            
            platforms.push(new Platform(2900, 520, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(2950 + i * 60, 520, 1, 'city'));
            }
            
            // 第一个传送到洞穴的传送门 - 从城市到洞穴
            platforms.push(new Platform(3300, 440, 250, 30, 'city'));
            portals.push(new Portal(3350, 440, 'cave', 8600, 520, '#8A2BE2'));
            
            platforms.push(new Platform(3650, 400, 350, 30, 'city'));
            for (let i = 0; i < 5; i++) {
                coins.push(new Coin(3700 + i * 60, 400, 1, 'city'));
            }
            
            platforms.push(new Platform(4100, 480, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(4150 + i * 60, 480, 1, 'city'));
            }
            
            platforms.push(new Platform(4500, 520, 300, 30, 'city'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(4550 + i * 60, 520, 1, 'city'));
            }
            
            platforms.push(new Platform(4900, 560, 200, 30, 'city'));
            let cityGoal = 5000;
            
            // ===== 云世界 (5000-9000) =====
            platforms.push(new Platform(5100, 560, 400, 30, 'cloud'));
            for (let i = 0; i < 6; i++) {
                coins.push(new Coin(5150 + i * 60, 560, 5, 'cloud'));
            }
            
            platforms.push(new Platform(5600, 520, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(5650 + i * 60, 520, 5, 'cloud'));
            }
            
            platforms.push(new Platform(6000, 480, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(6050 + i * 60, 480, 5, 'cloud'));
            }
            
            platforms.push(new Platform(6400, 520, 250, 30, 'cloud'));
            portals.push(new Portal(6450, 520, 'city', 2500, 520, '#FF4500'));
            
            platforms.push(new Platform(6750, 440, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(6800 + i * 60, 440, 5, 'cloud'));
            }
            
            // 第二个传送到洞穴的传送门 - 从云世界到洞穴
            platforms.push(new Platform(7150, 400, 250, 30, 'cloud'));
            portals.push(new Portal(7200, 400, 'cave', 9800, 440, '#9370DB')); // 目标改为9800,440的平台
            
            platforms.push(new Platform(7500, 480, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(7550 + i * 60, 480, 5, 'cloud'));
            }
            
            platforms.push(new Platform(7900, 520, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(7950 + i * 60, 520, 5, 'cloud'));
            }
            
            platforms.push(new Platform(8300, 560, 300, 30, 'cloud'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(8350 + i * 60, 560, 5, 'cloud'));
            }
            
            platforms.push(new Platform(8700, 520, 250, 30, 'cloud'));
            let cloudGoal = 8800;
            
            // ===== 洞穴世界 (8000-13000) =====
            platforms.push(new Platform(8100, 560, 400, 30, 'cave'));
            for (let i = 0; i < 6; i++) {
                coins.push(new Coin(8150 + i * 60, 560, 10, 'cave'));
            }
            
            platforms.push(new Platform(8600, 520, 300, 30, 'cave'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(8650 + i * 60, 520, 10, 'cave'));
            }
            
            platforms.push(new Platform(9000, 480, 300, 30, 'cave'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(9050 + i * 60, 480, 10, 'cave'));
            }
            
            platforms.push(new Platform(9400, 520, 250, 30, 'cave'));
            portals.push(new Portal(9450, 520, 'city', 3800, 520, '#FF4500'));
            
            platforms.push(new Platform(9800, 440, 300, 30, 'cave'));  // 这是从云世界传送门来的目标平台
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(9850 + i * 60, 440, 10, 'cave'));
            }
            
            platforms.push(new Platform(10200, 400, 250, 30, 'cave'));
            portals.push(new Portal(10250, 400, 'cloud', 7000, 450, '#87CEEB'));
            
            platforms.push(new Platform(10500, 480, 300, 30, 'cave'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(10550 + i * 60, 480, 10, 'cave'));
            }
            
            platforms.push(new Platform(10900, 520, 300, 30, 'cave'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(10950 + i * 60, 520, 10, 'cave'));
            }
            
            platforms.push(new Platform(11300, 560, 300, 30, 'cave'));
            for (let i = 0; i < 4; i++) {
                coins.push(new Coin(11350 + i * 60, 560, 10, 'cave'));
            }
            
            platforms.push(new Platform(11700, 520, 300, 30, 'cave'));
            let caveGoal = 11800;
            
            // 设置传送门的世界属性
            for (let portal of portals) {
                if (portal.x < 5000) portal.world = 'city';
                else if (portal.x < 8000) portal.world = 'cloud';
                else portal.world = 'cave';
            }
            
            // 玩家
            let player = new Player(100, 520);
            
            // 键盘
            let keys = {
                left: false,
                right: false,
                up: false
            };
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') keys.left = true;
                if (e.key === 'ArrowRight') keys.right = true;
                if (e.key === 'ArrowUp') keys.up = true;
                e.preventDefault();
            });
            
            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') keys.left = false;
                if (e.key === 'ArrowRight') keys.right = false;
                if (e.key === 'ArrowUp') keys.up = false;
                e.preventDefault();
            });
            
            function resetGame() {
                player = new Player(100, 520);
                currentWorld = 'city';
                totalCoins = 0;
                gameActive = true;
                gameWon = false;
                winType = null;
            }
            
            function updateScroll() {
                let targetScroll = player.x - 600;
                targetScroll = Math.max(0, Math.min(targetScroll, canvas.width - VIEWPORT_WIDTH));
                container.scrollLeft = targetScroll;
            }
            
            // ========== 游戏主循环 ==========
            function gameLoop() {
                animationTimer += 0.01;
                
                document.getElementById('coinDisplay').textContent = totalCoins;
                document.getElementById('attemptsDisplay').textContent = attempts;
                
                let worldNames = {
                    'city': '🌃 繁华都市',
                    'cloud': '☁️ 云中漫游',
                    'cave': '⛰️ 洞穴探险'
                };
                document.getElementById('worldDisplay').textContent = worldNames[currentWorld];
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // ===== 背景绘制 =====
                if (currentWorld === 'city') {
                    ctx.fillStyle = '#0A1F3A';
                    ctx.fillRect(0, 0, canvas.width, 300);
                    
                    ctx.fillStyle = '#FFFAD1';
                    ctx.beginPath();
                    ctx.arc(200, 80, 40, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'white';
                    for (let i = 0; i < 50; i++) {
                        let x = (i * 100 + animationTimer * 10) % canvas.width;
                        let y = 50 + Math.sin(i) * 20;
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    
                    ctx.fillStyle = '#FFD700';
                    for (let i = 0; i < 20; i++) {
                        let x = i * 300 + animationTimer * 5 % 300;
                        ctx.beginPath();
                        ctx.arc(x, 280, 8, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#654321';
                        ctx.fillRect(x - 3, 280, 6, 40);
                    }
                    
                    ctx.fillStyle = '#2A2A2A';
                    ctx.fillRect(0, 300, canvas.width, 300);
                    
                    ctx.fillStyle = '#FFF';
                    for (let i = 0; i < 30; i++) {
                        ctx.fillRect(i * 200 + animationTimer * 2 % 200, 320, 20, 5);
                    }
                    
                } else if (currentWorld === 'cloud') {
                    ctx.fillStyle = '#87CEEB';
                    ctx.fillRect(0, 0, canvas.width, 600);
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    for (let i = 0; i < 15; i++) {
                        let x = (i * 400 + animationTimer * 20) % (canvas.width + 400) - 200;
                        let y = 100 + Math.sin(i) * 50;
                        ctx.beginPath();
                        ctx.arc(x, y, 50, 0, Math.PI*2);
                        ctx.arc(x + 60, y - 10, 45, 0, Math.PI*2);
                        ctx.arc(x - 40, y - 5, 40, 0, Math.PI*2);
                        ctx.fill();
                    }
                    
                } else if (currentWorld === 'cave') {
                    ctx.fillStyle = '#2A1F0A';
                    ctx.fillRect(0, 0, canvas.width, 600);
                    
                    ctx.fillStyle = '#8B4513';
                    for (let i = 0; i < 20; i++) {
                        let x = i * 400 + animationTimer * 5 % 400;
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x - 30, 100);
                        ctx.lineTo(x + 30, 100);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    ctx.fillStyle = '#FFFAD1';
                    for (let i = 0; i < 30; i++) {
                        let x = (i * 200 + animationTimer * 30) % canvas.width;
                        let y = 200 + Math.sin(i + animationTimer) * 100;
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                
                if (gameActive && attempts > 0 && !gameWon) {
                    let currentPlatforms = platforms.filter(p => p.world === currentWorld);
                    let currentObstacles = obstacles.filter(o => o.world === currentWorld);
                    
                    let alive = player.update(currentPlatforms, currentObstacles);
                    
                    if (!alive) {
                        attempts--;
                        if (attempts > 0) {
                            resetGame();
                        } else {
                            gameActive = false;
                        }
                    }
                    
                    for (let coin of coins) {
                        if (coin.world === currentWorld && coin.checkCollect(player)) {
                            coin.collected = true;
                            totalCoins += coin.value;
                        }
                        coin.update();
                    }
                    
                    for (let portal of portals) {
                        portal.update();
                        if (portal.world === currentWorld) {
                            let result = portal.checkEnter(player);
                            if (result) {
                                currentWorld = result.world;
                                player.x = result.x;
                                player.y = result.y;
                            }
                        }
                    }
                    
                    if (currentWorld === 'city' && player.x > cityGoal) {
                        gameWon = true;
                        winType = 'city';
                    } else if (currentWorld === 'cloud' && player.x > cloudGoal) {
                        gameWon = true;
                        winType = 'cloud';
                    } else if (currentWorld === 'cave' && player.x > caveGoal) {
                        gameWon = true;
                        winType = 'cave';
                    }
                    
                    updateScroll();
                }
                
                // 绘制所有元素
                for (let plat of platforms) {
                    if (plat.world === currentWorld) {
                        plat.draw(ctx);
                    }
                }
                
                for (let coin of coins) {
                    if (coin.world === currentWorld) {
                        coin.draw(ctx);
                    }
                }
                
                for (let portal of portals) {
                    if (portal.world === currentWorld) {
                        portal.draw(ctx);
                    }
                }
                
                for (let obs of obstacles) {
                    if (obs.world === currentWorld) {
                        obs.draw(ctx);
                    }
                }
                
                // 绘制终点旗
                if (currentWorld === 'city') {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(cityGoal, 530, 20, 60);
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.moveTo(cityGoal + 20, 530);
                    ctx.lineTo(cityGoal + 60, 550);
                    ctx.lineTo(cityGoal + 20, 570);
                    ctx.fill();
                } else if (currentWorld === 'cloud') {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(cloudGoal, 490, 20, 60);
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.moveTo(cloudGoal + 20, 490);
                    ctx.lineTo(cloudGoal + 60, 510);
                    ctx.lineTo(cloudGoal + 20, 530);
                    ctx.fill();
                } else if (currentWorld === 'cave') {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(caveGoal, 490, 20, 60);
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.moveTo(caveGoal + 20, 490);
                    ctx.lineTo(caveGoal + 60, 510);
                    ctx.lineTo(caveGoal + 20, 530);
                    ctx.fill();
                }
                
                player.draw(ctx);
                
                // 胜利特效
                if (gameWon) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(container.scrollLeft, 0, VIEWPORT_WIDTH, VIEWPORT_HEIGHT);
                    
                    if (winType === 'city') {
                        for (let i = 0; i < 50; i++) {
                            let x = container.scrollLeft + 200 + (i * 30 + animationTimer * 50) % 900;
                            let y = (i * 20 + animationTimer * 100) % 600;
                            ctx.font = '30px Arial';
                            ctx.fillStyle = ['#FF69B4', '#FFA500', '#FF4500'][i % 3];
                            ctx.fillText('🌸', x, y);
                        }
                        
                        ctx.shadowColor = '#FFD700';
                        ctx.shadowBlur = 30;
                        ctx.font = 'bold 50px Arial';
                        ctx.fillStyle = '#FFD700';
                        ctx.fillText('恭喜通关！', container.scrollLeft + 350, 200);
                        
                        ctx.font = '40px Arial';
                        ctx.fillStyle = '#FF69B4';
                        ctx.fillText('祝爸爸生日快乐！', container.scrollLeft + 280, 300);
                        
                        ctx.font = '48px Arial';
                        ctx.fillStyle = '#FF4500';
                        ctx.fillText('永远爱你 mua😘', container.scrollLeft + 320, 400);
                        
                    } else if (winType === 'cloud') {
                        for (let i = 0; i < 40; i++) {
                            let x = container.scrollLeft + 200 + (i * 40 + animationTimer * 60) % 900;
                            let y = (i * 30 + animationTimer * 80) % 600;
                            ctx.font = '40px Arial';
                            ctx.fillStyle = '#FF69B4';
                            ctx.fillText('❤️', x, y);
                        }
                        
                        ctx.shadowColor = '#FF69B4';
                        ctx.shadowBlur = 30;
                        ctx.font = 'bold 50px Arial';
                        ctx.fillStyle = '#FFD700';
                        ctx.fillText('爸爸真棒！', container.scrollLeft + 380, 250);
                        
                        ctx.font = '48px Arial';
                        ctx.fillStyle = '#FFA500';
                        ctx.fillText('生日快乐🎂😁', container.scrollLeft + 300, 350);
                        
                    } else if (winType === 'cave') {
                        let sunY = 500 + Math.sin(animationTimer) * 200;
                        
                        ctx.shadowColor = '#FFD700';
                        ctx.shadowBlur = 50;
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.arc(container.scrollLeft + 650, sunY, 80, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.shadowBlur = 30;
                        ctx.font = 'bold 50px Arial';
                        ctx.fillStyle = '#FFD700';
                        ctx.fillText('每天都是更美好的一天', container.scrollLeft + 200, 250);
                        
                        ctx.font = '48px Arial';
                        ctx.fillStyle = '#FF69B4';
                        ctx.fillText('祝爸爸生日快乐🎂', container.scrollLeft + 300, 350);
                        
                        ctx.font = '40px Arial';
                        ctx.fillStyle = '#FF4500';
                        ctx.fillText('爱你❤️！', container.scrollLeft + 500, 450);
                    }
                }
                
                requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        })();
    </script>
</body>
</html>
